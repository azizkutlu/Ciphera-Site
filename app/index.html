<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cipheria — Uygulamayı İndir</title>
  <meta name="description" content="Cipheria'yı indir: telefon güvenlik ve analiz uygulaması.">
  <meta name="apple-itunes-app" content="app-id=6761788818">
  <meta name="google-play-app" content="app-id=com.azizkutlu.ciphera">
  <meta name="theme-color" content="#020706">
  <meta property="og:title" content="Cipheria">
  <meta property="og:description" content="Telefonunu analiz et — uygulamayı indir.">
  <meta property="og:type" content="website">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;
      background:#020706;color:#fff;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:24px;text-align:center;
      -webkit-font-smoothing:antialiased;
    }
    .box{max-width:420px;width:100%}
    .logo{
      width:88px;height:88px;border-radius:22px;margin:0 auto 20px;
      background:linear-gradient(135deg,#FFD600 0%,#FFA500 100%);
      display:flex;align-items:center;justify-content:center;
      font-size:42px;font-weight:900;color:#020706;
      box-shadow:0 10px 40px rgba(255,214,0,.25);
    }
    .spinner{
      width:34px;height:34px;border:3px solid rgba(255,255,255,.12);
      border-top-color:#FFD600;border-radius:50%;
      animation:spin .9s linear infinite;margin:0 auto 18px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    h1{font-size:22px;margin:14px 0 8px;font-weight:700;letter-spacing:-.3px}
    p{opacity:.65;font-size:14px;margin:0 0 22px;line-height:1.5}
    .btns{display:flex;flex-direction:column;gap:12px;margin-top:20px}
    .btn{
      padding:15px 22px;border-radius:14px;
      background:#FFD600;color:#020706;
      text-decoration:none;font-weight:700;font-size:15px;
      transition:transform .15s ease;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn:hover{transform:translateY(-2px)}
    .btn.alt{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12)}
    .small{font-size:12px;opacity:.4;margin-top:24px}
    .small a{color:inherit}
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">C</div>
    <div class="spinner" id="spinner"></div>
    <h1>Cipheria açılıyor…</h1>
    <p>Cihazınıza uygun mağazaya yönlendiriliyorsunuz.</p>
    <div class="btns" id="manual" style="display:none">
      <a class="btn" id="iosBtn"
         href="https://apps.apple.com/app/id6761788818">App Store'dan İndir</a>
      <a class="btn alt" id="androidBtn"
         href="https://play.google.com/store/apps/details?id=com.azizkutlu.ciphera">Google Play'den İndir</a>
    </div>
    <div class="small">
      Yönlendirme çalışmadıysa <a href="https://azizkutlu.github.io/Ciphera-Site/">web sitemizi</a> ziyaret edin.
    </div>
  </div>

  <script>
    (function () {
      var IOS_URL     = "https://apps.apple.com/app/id6761788818";
      var ANDROID_URL = "https://play.google.com/store/apps/details?id=com.azizkutlu.ciphera";
      var WEB_URL     = "https://azizkutlu.github.io/Ciphera-Site/";

      var ua = navigator.userAgent || navigator.vendor || "";
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /android/i.test(ua);

      // UTM/kampanya parametrelerini koru — Play Store'da install_referrer
      // olarak iletilir (attribution için kritik).
      var qs = window.location.search || "";

      if (isAndroid) {
        var sep = ANDROID_URL.indexOf("?") > -1 ? "&" : "?";
        var referrer = qs ? sep + "referrer=" + encodeURIComponent(qs.substring(1)) : "";
        window.location.replace(ANDROID_URL + referrer);
      } else if (isIOS) {
        window.location.replace(IOS_URL + qs);
      } else {
        // Desktop / bilinmeyen — manuel butonları göster, spinner'ı gizle
        document.getElementById("spinner").style.display = "none";
        document.getElementById("manual").style.display = "flex";
      }
    })();
  </script>
</body>
</html>
